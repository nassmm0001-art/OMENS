<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Oracle | Quantum Entropy Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060d;
            --surface: #070e1a;
            --cyan: #00e5ff;
            --magenta: #d946ff;
            --gold: #f0c674;
            --border: rgba(0, 229, 255, 0.2);
        }

        * { cursor: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        #trail-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 9999;
            pointer-events: none;
        }

        /* Top Visualization Section */
        .visualization-area {
            width: 100%;
            padding: 40px 5%;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            min-height: 30vh;
        }

        .section-label {
            color: var(--cyan);
            font-size: 12px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: block;
        }

        #shard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .shard-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .shard-box strong { color: var(--magenta); display: block; margin-bottom: 4px; }

        /* Main Interaction Area */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .control-panel {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .ui-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 11px;
            color: var(--cyan);
            text-transform: uppercase;
        }

        select, input {
            background: #000;
            border: 1px solid var(--border);
            padding: 15px;
            color: #fff;
            font-family: inherit;
            outline: none;
            width: 100%;
        }

        .synthesize-btn {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 4px;
            transition: all 0.3s;
        }

        .synthesize-btn:hover {
            background: var(--cyan);
            color: #000;
            box-shadow: 0 0 20px var(--cyan);
        }

        #ai-output {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        #ai-output strong { color: var(--gold); }

    </style>
</head>
<body>

<canvas id="trail-canvas"></canvas>

<div class="visualization-area">
    <span class="section-label">QUANTUM ENTROPY FEED</span>
    <div id="shard-grid">
        <div class="shard-box">SYSTEM_IDLE: Awaiting input...</div>
    </div>
</div>

<div class="main-container">
    <div class="control-panel">
        <div class="ui-row">
            <div class="input-group">
                <label>Category</label>
                <select id="source-type">
                    <option value="tarot">Tarot</option>
                    <option value="runes">Runes</option>
                    <option value="wikipedia">Wikipedia</option>
                    <option value="chaos">Chaos</option>
                </select>
            </div>
            <div class="input-group">
                <label>Quantity</label>
                <select id="shard-count">
                    </select>
            </div>
        </div>

        <div class="input-group" style="margin-bottom: 30px;">
            <label>Question</label>
            <input type="text" id="user-question" placeholder="Enter inquiry or leave blank for open reading...">
        </div>

        <button class="btn synthesize-btn" onclick="runSynthesis()">INITIATE SYNTHESIS</button>

        <div id="ai-output">
            </div>
    </div>
</div>

<script>
    // POPULATE QUANTITY DROPDOWN
    const countSelect = document.getElementById('shard-count');
    for(let i=1; i<=20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i;
        if(i === 3) opt.selected = true;
        countSelect.appendChild(opt);
    }

    // CURSOR TRAIL
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 2 + 1;
            this.life = 100;
            this.color = `rgba(0, 229, 255, ${Math.random()})`;
        }
        update() { this.life -= 2; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<2; i++) particles.push(new Particle(e.clientX, e.clientY));
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // CORE LOGIC
    async function runSynthesis() {
        const grid = document.getElementById('shard-grid');
        const output = document.getElementById('ai-output');
        const type = document.getElementById('source-type').value;
        const count = document.getElementById('shard-count').value;
        const question = document.getElementById('user-question').value;

        grid.innerHTML = "";
        output.innerHTML = "Accessing quantum entropy pools...";

        try {
            // Get seed from ANU Quantum RNG
            const seedRes = await fetch('https://qrng.anu.edu.au/API/jsonI.php?length=1&type=uint16');
            const seedData = await seedRes.json();
            const seed = seedData.data[0];

            let shards = [];
            for (let i = 0; i < count; i++) {
                let val = "";
                if (type === 'tarot') {
                    const deck = ["The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"];
                    val = deck[(seed + i) % deck.length];
                } else if (type === 'runes') {
                    const runes = ["Fehu", "Uruz", "Thurisaz", "Ansuz", "Raidho", "Kenaz", "Gebo", "Wunjo", "Hagalaz", "Nauthiz", "Isa", "Jera", "Eihwaz", "Perthro", "Algiz", "Sowilo", "Tiwaz", "Berkano", "Ehwaz", "Mannaz", "Laguz", "Ingwaz", "Dagaz", "Othala"];
                    val = runes[(seed + i) % runes.length];
                } else if (type === 'wikipedia') {
                    const wiki = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary').then(r => r.json());
                    val = wiki.title;
                } else {
                    val = `HASH_${Math.random().toString(36).substring(2, 10).toUpperCase()}`;
                }
                
                shards.push(val);
                grid.innerHTML += `<div class="shard-box"><strong>SHARD ${i+1}</strong>${val}</div>`;
            }

            // Call API
            const res = await fetch('/api/interpret', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, symbols: shards })
            });
            const data = await res.json();
            
            output.innerHTML = `
                <div style="margin-bottom:15px;"><strong>PATTERN:</strong> ${data[0].pattern}</div>
                <div style="margin-bottom:15px;"><strong>READING:</strong> ${data[0].reading}</div>
                <div style="font-style:italic; border-left: 2px solid var(--cyan); padding-left: 15px;">↳ ${data[0].action}</div>
            `;

        } catch (e) {
            output.innerHTML = "LINK_FAILURE: Entropy field unstable.";
        }
    }
</script>
</body>
</html>
