<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-ORACLE | Quantum Synthesizer 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syne+Mono&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060d;
            --surface: #060c17;
            --neon: #00e5ff;
            --gold: #ffb547;
            --void: #d946ff;
            --text: #7a9ab8;
            --text-bright: #e0f0ff;
            --border: rgba(0,229,255,0.1);
        }

        * { cursor: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Mouse Trail Canvas */
        #trail-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 9999;
            pointer-events: none;
        }

        /* Top Header */
        .header {
            width: 100%;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon);
            letter-spacing: 5px;
            margin: 0;
            font-size: 1.2rem;
        }

        /* RANDOMNESS VISUALIZATION (Top Section) */
        .entropy-view {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            min-height: 200px;
        }

        .shard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .shard {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            font-size: 11px;
            text-transform: uppercase;
            animation: flicker 2s infinite ease-in-out;
        }

        .shard strong { color: var(--neon); display: block; margin-bottom: 5px; }

        /* MAIN UI (Bottom Section) */
        .control-pod {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 800px;
            padding: 30px;
            margin-bottom: 100px;
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.05);
        }

        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-end;
        }

        .input-group { flex: 1; }
        
        label { 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 10px; 
            display: block;
            color: var(--neon);
        }

        input, select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 12px;
            color: var(--text-bright);
            font-family: inherit;
            outline: none;
        }

        /* Scrollable Card Selector */
        .card-scroller {
            height: 45px;
            overflow-y: scroll;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            text-align: center;
            scrollbar-width: none;
        }
        .card-scroller::-webkit-scrollbar { display: none; }
        .card-option { padding: 10px; transition: 0.3s; color: var(--text); }
        .card-option:hover { color: var(--neon); background: rgba(0,229,255,0.1); }

        .btn-link {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 3px;
            transition: 0.4s;
            margin-top: 20px;
        }

        .btn-link:hover {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 30px var(--neon);
        }

        #interpretation-output {
            margin-top: 40px;
            font-family: 'Syne Mono', monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-bright);
            padding: 20px;
            border-left: 2px solid var(--gold);
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

<canvas id="trail-canvas"></canvas>

<div class="header">
    <h1>OMNI-ORACLE // NEURAL BRIDGE</h1>
</div>

<div class="entropy-view">
    <label>RAW QUANTUM ENTROPY FEED</label>
    <div id="shard-grid" class="shard-grid">
        <div class="shard">WAITING FOR QUANTUM INITIALIZATION...</div>
    </div>
</div>

<div class="control-pod">
    <div class="input-row">
        <div class="input-group">
            <label>SOURCE CATEGORY</label>
            <select id="source-type">
                <option value="tarot">ARCANA (TAROT)</option>
                <option value="chaos">CHAOS (GENERAL ENTROPY)</option>
                <option value="wiki">COLLECTIVE (WIKIPEDIA)</option>
            </select>
        </div>
        <div class="input-group" style="max-width: 120px;">
            <label>SHARD COUNT</label>
            <div class="card-scroller" id="count-scroller">
                <div class="card-option">1</div>
                <div class="card-option">2</div>
                <div class="card-option" style="color:var(--neon)">3</div>
                <div class="card-option">4</div>
                <div class="card-option">5</div>
                <div class="card-option">7</div>
                <div class="card-option">11</div>
            </div>
        </div>
    </div>

    <div class="input-group">
        <label>NEURAL INQUIRY</label>
        <input type="text" id="user-question" placeholder="WHAT IS THE FREQUENCY OF THIS MOMENT?">
    </div>

    <button class="btn-link" onclick="synthesize()">INITIATE SYNTHESIS</button>

    <div id="interpretation-output">
        </div>
</div>

<script>
    // MOUSE TRAIL LOGIC (from Index 2)
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 2 - 1;
            this.speedY = Math.random() * 2 - 1;
            this.color = `rgba(0, 229, 255, ${Math.random() * 0.5})`;
            this.life = 100;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= 2;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<3; i++) particles.push(new Particle(e.clientX, e.clientY));
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // CORE LOGIC
    let selectedCardCount = 3;
    document.querySelectorAll('.card-option').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.card-option').forEach(o => o.style.color = 'var(--text)');
            opt.style.color = 'var(--neon)';
            selectedCardCount = parseInt(opt.innerText);
        };
    });

    async function synthesize() {
        const output = document.getElementById('interpretation-output');
        const grid = document.getElementById('shard-grid');
        const question = document.getElementById('user-question').value;
        const type = document.getElementById('source-type').value;

        output.innerHTML = "SYPHONING QUANTUM ENTROPY...";
        grid.innerHTML = "";

        try {
            // Get random seed from ANU Quantum RNG (Legacy logic from Index)
            const seedRes = await fetch('https://qrng.anu.edu.au/API/jsonI.php?length=1&type=uint16');
            const seedData = await seedRes.json();
            const seed = seedData.data[0];

            let shards = [];
            for (let i = 0; i < selectedCardCount; i++) {
                let val = "";
                if (type === 'tarot') {
                    const deck = ["The Fool", "Death", "The Tower", "The Sun", "The Moon", "The Star", "Judgment", "The Emperor", "Strength", "10 of Cups", "The Lovers", "The Magician"];
                    val = deck[(seed + i) % deck.length];
                } else if (type === 'wiki') {
                    const wiki = await fetch('https://en.wikipedia.org/api/rest_v1/page/random/summary').then(r => r.json());
                    val = wiki.title;
                } else {
                    val = `CHAOS_HASH_${Math.random().toString(36).substring(7).toUpperCase()}`;
                }
                shards.push(val);
                grid.innerHTML += `<div class="shard"><strong>SHARD ${i+1}</strong>${val}</div>`;
            }

            // Call API
            const res = await fetch('/api/interpret', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, symbols: shards })
            });
            const data = await res.json();
            
            output.innerHTML = `
                <div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">${data[0].pattern}</div>
                <div>${data[0].reading}</div>
                <div style="margin-top:20px; font-style:italic; opacity:0.8;">↳ ${data[0].action}</div>
            `;

        } catch (e) {
            output.innerHTML = "QUANTUM DECOHERENCE DETECTED. RETRY LINK.";
        }
    }
</script>
</body>
</html>
