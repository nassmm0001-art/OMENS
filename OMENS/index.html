<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Oracle | Quantum Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03060d;
            --surface: #070e1a;
            --cyan: #00e5ff;
            --magenta: #d946ff;
            --gold: #f0c674;
            --border: rgba(0, 229, 255, 0.2);
        }

        /* 1. RESTORED CURSOR */
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 2. FIXED CANVAS LAYERING */
        #trail-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 0; /* Behind everything */
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10; /* Above the canvas so buttons work */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .visualization-area {
            width: 100%;
            padding: 60px 5% 20px;
            background: linear-gradient(to bottom, #000, transparent);
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #shard-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        /* 3. SHARD BOX VISUALS */
        .shard-box {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 160px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .shard-image {
            width: 100%;
            height: 120px;
            object-fit: contain;
            filter: brightness(0) saturate(100%) invert(80%) sepia(50%) saturate(5000%) hue-rotate(150deg);
            margin-bottom: 15px;
        }

        .hexagram-display {
            font-size: 80px;
            color: var(--cyan);
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 15px var(--cyan);
        }

        .shard-name { color: var(--magenta); font-size: 11px; font-weight: bold; }

        /* 4. CONTROL PANEL */
        .control-panel {
            width: 90%;
            max-width: 800px;
            background: rgba(7, 14, 26, 0.9);
            border: 1px solid var(--border);
            padding: 30px;
            margin: 40px 0;
            backdrop-filter: blur(5px);
        }

        .ui-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        input, select {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--cyan); color: #000; }

        #ai-output { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>

<canvas id="trail-canvas"></canvas>

<main>
    <div class="visualization-area">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px; color: var(--cyan);">QUANTUM FEED</h2>
        <div id="shard-grid">
            <div class="shard-box">
                <div class="hexagram-display" style="opacity: 0.2;">?</div>
                <div class="shard-name">AWAITING SIGNAL</div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="ui-row">
            <select id="source-type">
                <option value="iching">I Ching (64)</option>
                <option value="tarot">Tarot (78)</option>
                <option value="runes">Runes (24)</option>
                <option value="astrology">Astrology</option>
            </select>
            <select id="shard-count">
                <option value="1">1 Shard</option>
                <option value="3" selected>3 Shards</option>
                <option value="5">5 Shards</option>
            </select>
        </div>
        <input type="text" id="user-question" placeholder="Quantize your intention..." style="width:100%; margin-bottom: 20px;">
        <button onclick="runSynthesis()">INITIATE SYNTHESIS</button>
        <div id="ai-output"></div>
    </div>
</main>

<script>
    // ... (Keep the REPOS lists from the previous version) ...
    const REPOS = {
        tarot: ["The Fool", "The Magician", "The High Priestess", "The Empress", "The Emperor", "The Hierophant", "The Lovers", "The Chariot", "Strength", "The Hermit", "Wheel of Fortune", "Justice", "The Hanged Man", "Death", "Temperance", "The Devil", "The Tower", "The Star", "The Moon", "The Sun", "Judgement", "The World"], // truncated for space
        runes: ["Fehu", "Uruz", "Thurisaz", "Ansuz", "Raidho", "Kenaz", "Gebo", "Wunjo", "Hagalaz", "Nauthiz", "Isa", "Jera", "Eihwaz", "Perthro", "Algiz", "Sowilo", "Tiwaz", "Berkano", "Ehwaz", "Mannaz", "Laguz", "Ingwaz", "Dagaz", "Othala"],
        iching: ["1. Qian (The Creative)", "2. Kun (The Receptive)", "3. Zhun (Initial Difficulty)", "4. Meng (Youthful Folly)"], // truncated
        astrology: ["Sun", "Moon", "Mercury", "Venus", "Mars", "Jupiter", "Saturn", "Aries", "Taurus", "Gemini", "Cancer", "Leo", "Virgo", "Libra", "Scorpio", "Sagittarius", "Capricorn", "Aquarius", "Pisces"]
    };

    function getRemoteURL(folder, name) {
        const clean = name.toLowerCase().trim().replace(/[.\(\)]/g, '').replace(/\s+/g, '-');
        if (folder === 'tarot') return `https://raw.githubusercontent.com/sergiopiccinelli/tarot-cards/master/dist/img/${clean}.png`;
        if (folder === 'runes') return `https://raw.githubusercontent.com/mizofaye/runes/master/svg/${clean}.svg`;
        if (folder === 'astrology') return `https://raw.githubusercontent.com/travisyunis/astrology_icons/master/icons/svg/${clean}.svg`;
        return "";
    }

    async function runSynthesis() {
        const grid = document.getElementById('shard-grid');
        const output = document.getElementById('ai-output');
        const type = document.getElementById('source-type').value;
        const count = parseInt(document.getElementById('shard-count').value);
        
        grid.innerHTML = "";
        output.innerHTML = "Establishing Quantum Link...";

        // Simulation of entropy selection
        for(let i=0; i<count; i++) {
            const list = REPOS[type];
            const val = list[Math.floor(Math.random() * list.length)];
            
            let visual = "";
            if(type === 'iching') {
                const hexNum = parseInt(val.split(".")[0]) - 1;
                visual = `<div class="hexagram-display">${String.fromCharCode(19904 + hexNum)}</div>`;
            } else {
                visual = `<img src="${getRemoteURL(type, val)}" class="shard-image" onerror="this.src='https://via.placeholder.com/150/00e5ff/000000?text=ICON';">`;
            }

            grid.innerHTML += `
                <div class="shard-box">
                    ${visual}
                    <div class="shard-name">${val}</div>
                </div>
            `;
        }
        output.innerHTML = "Synthesis complete. Interpretation engine offline (Awaiting Backend).";
    }

    // CANVAS FIX
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    let particles = [];
    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<3; i++) particles.push({ x: e.clientX, y: e.clientY, life: 1.0 });
    });

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.life -= 0.02;
            ctx.fillStyle = `rgba(0, 229, 255, ${p.life})`;
            ctx.fillRect(p.x, p.y, 2, 2);
        });
        particles = particles.filter(p => p.life > 0);
        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
