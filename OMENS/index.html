<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Oracle | Quantum Entropy Lab</title>

    <style>
        :root {
            --bg: #03060d;
            --surface: #070e1a;
            --cyan: #00e5ff;
            --magenta: #d946ff;
            --gold: #f0c674;
            --border: rgba(0, 229, 255, 0.2);
            --border-glow: rgba(0, 229, 255, 0.5);
        }

        * { cursor: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        #trail-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 9999;
            pointer-events: none;
        }

        .visualization-area {
            width: 100%;
            padding: 40px 5%;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            min-height: 38vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-label {
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--border-glow);
        }

        #shard-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .shard-box {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 170px;
            min-height: 240px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shard-box:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 25px var(--border-glow);
            transform: translateY(-5px) scale(1.02);
        }

        /* Remote Image Filter (Hologram Look) */
        .shard-image {
            width: 100%;
            height: 130px;
            object-fit: contain;
            margin-bottom: 15px;
            filter: brightness(0) saturate(100%) invert(80%) sepia(50%) saturate(5000%) hue-rotate(150deg);
            opacity: 0.9;
        }

            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
